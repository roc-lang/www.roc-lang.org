on:
  pull_request:

name: CI checks

# Cancel job if new one is started
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Do not add permissions here! Configure them at the job level!
permissions: {}

jobs:
  ci-checks:
    runs-on: [ubuntu-24.04]
    timeout-minutes: 30
    env:
      FORCE_COLOR: 1
    steps:
      - uses: actions/checkout@v4

      - run: cargo install typos-cli --version 1.34.0

      - name: do spell check with typos-cli 1.34.0
        run: typos

      - uses: roc-lang/setup-roc@cbe782d6f165b89c87d99f50a59ac4f5f73b4427
        with:
          # Note: nightly hashes are not verified because they are updated regularly.
          version: nightly

      - run: roc version

      - run: |
          cd website
          roc check build_website.roc

      - uses: roc-lang/setup-roc@cbe782d6f165b89c87d99f50a59ac4f5f73b4427
        with:
          version: nightly-new-compiler

      - name: Test interactive Roc widgets
        run: ci_scripts/test_interactive_roc.sh

  test-install-script-unix:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: x86_64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-15
            platform: macos
            arch: apple_silicon
          - os: macos-15-intel
            platform: macos
            arch: x86_64
          - os: macos-26
            platform: macos
            arch: apple_silicon
          - os: macos-26-intel
            platform: macos
            arch: x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Extract ROC_NIGHTLY_VERSION from install script
        run: |
          VERSION_DATE=$(grep '^VERSION_DATE=' website/public/install_roc.sh | cut -d'"' -f2)
          BUILD_ID=$(grep '^BUILD_ID=' website/public/install_roc.sh | cut -d'"' -f2)
          echo "ROC_NIGHTLY_VERSION=${VERSION_DATE}-${BUILD_ID}" >> "$GITHUB_ENV"

      - name: Test install script (answer no to PATH)
        run: |
          cd website/public
          ROC_CONTINUE_IF_STALE=y ROC_ADD_TO_PATH=n bash install_roc.sh

      - name: Verify installation (no PATH)
        run: |
          cd website/public
          DIR_NAME="roc_nightly-${{ matrix.platform }}_${{ matrix.arch }}-${{ env.ROC_NIGHTLY_VERSION }}"
          if [ ! -d "$DIR_NAME" ]; then
            echo "Error: Installation directory $DIR_NAME not found"
            exit 1
          fi

      - name: Test roc binary (no PATH)
        run: |
          cd website/public
          DIR_NAME="roc_nightly-${{ matrix.platform }}_${{ matrix.arch }}-${{ env.ROC_NIGHTLY_VERSION }}"
          "$DIR_NAME/roc" version

      - name: Clean up for second test
        run: |
          cd website/public
          rm -rf roc_nightly-*

      - name: Test install script (answer yes to PATH)
        run: |
          cd website/public
          ROC_CONTINUE_IF_STALE=y ROC_ADD_TO_PATH=y bash install_roc.sh

      - name: Verify PATH was updated
        run: |
          # Detect shell profile based on SHELL
          if [ -n "${SHELL:-}" ]; then
            case "$SHELL" in
              */bash) PROFILE="$HOME/.bashrc" ;;
              */zsh)  PROFILE="$HOME/.zshrc" ;;
              */fish) PROFILE="$HOME/.config/fish/config.fish" ;;
              *)      PROFILE="$HOME/.profile" ;;
            esac
          else
            PROFILE="$HOME/.profile"
          fi

          if ! grep -q "roc_nightly-${{ matrix.platform }}_${{ matrix.arch }}-${{ env.ROC_NIGHTLY_VERSION }}" "$PROFILE"; then
            echo "Error: PATH not updated in $PROFILE"
            exit 1
          fi
          echo "✅ PATH successfully updated in $PROFILE"

  test-install-script-windows:
    strategy:
      matrix:
        include:
          - os: windows-2022
            arch: x86_64
            proc_arch: AMD64
          - os: windows-2025
            arch: x86_64
            proc_arch: AMD64
          #- os: windows-11-arm
          #  arch: arm64
          #  proc_arch: ARM64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Extract ROC_NIGHTLY_VERSION from install script
        shell: pwsh
        run: |
          $content = Get-Content website/public/install_roc.sh -Raw
          $versionDate = [regex]::Match($content, 'VERSION_DATE="([^"]+)"').Groups[1].Value
          $buildId = [regex]::Match($content, 'BUILD_ID="([^"]+)"').Groups[1].Value
          echo "ROC_NIGHTLY_VERSION=${versionDate}-${buildId}" >> $env:GITHUB_ENV

      - name: Test install script (answer no to PATH)
        shell: pwsh
        env:
          PROCESSOR_ARCHITECTURE: ${{ matrix.proc_arch }}
          ROC_CONTINUE_IF_STALE: y
        run: |
          Set-Location website/public
          "n" | pwsh -ExecutionPolicy Bypass -File .\install_roc.ps1

      - name: Verify installation (no PATH)
        shell: pwsh
        run: |
          Set-Location website/public
          $dirName = "roc_nightly-windows_${{ matrix.arch }}-${{ env.ROC_NIGHTLY_VERSION }}"
          if (-not (Test-Path $dirName)) {
            Write-Error "❌ Installation directory $dirName not found"
          } else {
            Write-Host "✅ Found $dirName"
          }

      - name: Test roc binary (no PATH) – x86_64 only
        if: ${{ matrix.arch == 'x86_64' }}
        shell: pwsh
        run: |
          Set-Location website/public
          $dirName = "roc_nightly-windows_x86_64-${{ env.ROC_NIGHTLY_VERSION }}"
          $rocPath = Join-Path $dirName "roc.exe"
          if (-not (Test-Path $rocPath)) {
            Write-Host "❌ roc.exe not found at $rocPath"
            Write-Host "Contents of ${dirName}:"
            Get-ChildItem $dirName -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }
            exit 1
          } else {
            Write-Host "Running roc.exe version..."
            & $rocPath version
          }

      - name: Clean up for second test
        shell: pwsh
        run: |
          Set-Location website/public
          Get-Item .\roc_nightly-* -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          Write-Host "🧹 Cleaned up previous installation directories"

      - name: Test install script (answer yes to PATH)
        shell: pwsh
        env:
          PROCESSOR_ARCHITECTURE: ${{ matrix.proc_arch }}
          ROC_CONTINUE_IF_STALE: y
        run: |
          Set-Location website/public
          "y" | pwsh -ExecutionPolicy Bypass -File .\install_roc.ps1

      - name: Verify PATH was updated
        shell: pwsh
        env:
          PROCESSOR_ARCHITECTURE: ${{ matrix.proc_arch }}
        run: |
          $dirName = "roc_nightly-windows_${{ matrix.arch }}-${{ env.ROC_NIGHTLY_VERSION }}"

          # The script uses SetEnvironmentVariable("Path", "User")
          $userPath = [System.Environment]::GetEnvironmentVariable("Path", "User")

          if ([string]::IsNullOrEmpty($userPath)) {
            Write-Error "❌ User PATH is empty or not readable"
            exit 1
          }

          if ($userPath -notlike "*$dirName*") {
            Write-Error "❌ PATH not updated with $dirName"
            exit 1
          } else {
            Write-Host "✅ PATH successfully updated with $dirName"
          }

      - name: Test roc binary (after PATH update)
        shell: pwsh
        run: |
          $dirName = "roc_nightly-windows_${{ matrix.arch }}-${{ env.ROC_NIGHTLY_VERSION }}"
          $rocPath = Join-Path $PWD "website/public\$dirName\roc.exe"

          # Pull the updated user PATH and merge into current session
          $userPath = [System.Environment]::GetEnvironmentVariable("Path", "User")
          $env:PATH = "$userPath;$env:PATH"

          Write-Host "Running roc.exe version..."
          roc.exe version
