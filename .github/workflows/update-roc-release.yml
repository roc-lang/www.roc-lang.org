name: Update Roc Release

on:
  schedule:
    # Run daily at 10 AM UTC, after the nightlies are typically published.
    - cron: '0 10 * * *'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  update-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Update install scripts to the latest nightly
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python3 ci_scripts/update_roc_release.py

    - name: Open a pull request if the release changed
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if git diff --quiet -- website/public/install_roc.sh website/public/install_roc.ps1; then
          echo "Install scripts already point at the latest nightly. Nothing to do."
          exit 0
        fi

        BRANCH="update-roc-release"

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git switch -C "$BRANCH"
        git add website/public/install_roc.sh website/public/install_roc.ps1
        git commit -m "Update Roc release in install scripts"
        git push --force origin "$BRANCH"

        # Open a PR only if one isn't already open for this branch; otherwise the
        # force-push above has already refreshed the existing PR.
        if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
          gh pr create \
            --title "Update Roc release in install scripts" \
            --body "Automated update of the pinned Roc nightly in \`install_roc.sh\` and \`install_roc.ps1\` to the latest release from \`roc-lang/nightlies\`." \
            --head "$BRANCH"
        fi
